# VirtualHost Apache para Serena Bites.
# ───────────────────────────────────────────────────────────────
# 1. Copia este archivo:
#      sudo cp deploy/serenabites.conf /etc/apache2/sites-available/serenabites.conf
# 2. Habilita los módulos necesarios:
#      sudo a2enmod proxy proxy_http headers rewrite expires deflate alias
# 3. Activa el sitio y deshabilita el default:
#      sudo a2dissite 000-default
#      sudo a2ensite serenabites
#      sudo systemctl reload apache2
# 4. Para HTTPS con Let's Encrypt:
#      sudo apt install -y certbot python3-certbot-apache
#      sudo certbot --apache -d serenabites.com -d www.serenabites.com
#    (certbot añade automáticamente /etc/apache2/sites-available/serenabites-le-ssl.conf
#     y configura la redirección 80→443)
# ───────────────────────────────────────────────────────────────
# Layout del repo:
#   /var/www/serenabites/
#     index.html, brand/                      ← site público
#     admin-ui/{index.html, app.js, app.css}  ← back-office SPA
#     api/, admin/, server.js, package.json   ← backend Node (NO accesible)
#     data/serenabites.db                     ← DB SQLite (NO accesible)
# ───────────────────────────────────────────────────────────────

<VirtualHost *:80>
  ServerName serenabites.com
  ServerAlias www.serenabites.com
  ServerAdmin hola@serenabites.com

  DocumentRoot /var/www/serenabites
  DirectoryIndex index.html

  <Directory /var/www/serenabites>
    Require all granted
    Options -Indexes +FollowSymLinks
    AllowOverride None
  </Directory>

  # Protege todo lo que NO debe ser accesible vía web
  <DirectoryMatch "/var/www/serenabites/(api|admin|deploy|node_modules|data|\.git)(/|$)">
    Require all denied
  </DirectoryMatch>
  <FilesMatch "^(\.env.*|package(-lock)?\.json|server\.js|.*\.db|.*\.db-journal|.*\.db-wal|.*\.db-shm)$">
    Require all denied
  </FilesMatch>

  # /admin → SPA del back-office
  Alias /admin /var/www/serenabites/admin-ui
  <Directory /var/www/serenabites/admin-ui>
    Require all granted
    Options -Indexes
    DirectoryIndex index.html
    # Cache cero para el bundle: queremos que actualizaciones del back-office
    # se vean en el siguiente request.
    Header set Cache-Control "no-store"
  </Directory>
  # /admin sin barra → /admin/
  RedirectMatch 301 ^/admin$ /admin/

  # Reverse proxy /api/* → Node (127.0.0.1:3000)
  ProxyRequests Off
  ProxyPreserveHost On
  ProxyPass        /api/  http://127.0.0.1:3000/api/  retry=0 timeout=15
  ProxyPassReverse /api/  http://127.0.0.1:3000/api/

  RequestHeader set X-Forwarded-Proto "http"
  RequestHeader set X-Forwarded-Host  "%{HTTP_HOST}e"

  # Cabeceras de seguridad razonables
  Header always set X-Content-Type-Options "nosniff"
  Header always set X-Frame-Options "SAMEORIGIN"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

  # Caché agresiva para assets versionables (cambian de URL en deploy)
  <FilesMatch "\.(svg|woff2?|ttf|eot|ico|png|jpg|jpeg|webp)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>
  # HTML sitio público — caché corta para que un deploy se vea pronto
  <FilesMatch "^index\.html$">
    Header set Cache-Control "public, max-age=300, must-revalidate"
  </FilesMatch>

  AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml

  ErrorLog  ${APACHE_LOG_DIR}/serenabites-error.log
  CustomLog ${APACHE_LOG_DIR}/serenabites-access.log combined
</VirtualHost>

# Cuando certbot añada el bloque <VirtualHost *:443>, asegúrate de mantener
# dentro de él (lo más importante para Stripe):
#
#   RequestHeader set X-Forwarded-Proto "https"
#
# Si certbot no la pone, edítala a mano en serenabites-le-ssl.conf y
# recarga apache2.
