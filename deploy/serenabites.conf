# VirtualHost Apache para Serena Bites — solo HTTP.
# El bloque HTTPS lo crea/mantiene certbot en serenabites-le-ssl.conf.
# ───────────────────────────────────────────────────────────────
# Convención del servidor:
#   - Código físico:    /home/ubuntu/web/serenabites
#   - Symlink público:  /var/www/html/serenabites → /home/ubuntu/web/serenabites
# ───────────────────────────────────────────────────────────────
# Instalación:
#   sudo cp deploy/serenabites.conf /etc/apache2/sites-available/serenabites.conf
#   sudo a2enmod proxy proxy_http headers rewrite expires deflate alias ssl
#   sudo a2ensite serenabites
#   sudo systemctl reload apache2
#
# HTTPS con certbot:
#   sudo certbot --apache -d serenabites.com -d www.serenabites.com
#   → certbot crea /etc/apache2/sites-available/serenabites-le-ssl.conf
#   → AÑADE estas dos líneas DENTRO de su <VirtualHost *:443>:
#         Include /var/www/html/serenabites/deploy/serenabites-common.conf
#         RequestHeader set X-Forwarded-Proto "https"
#   → sudo apache2ctl configtest && sudo systemctl reload apache2
# ───────────────────────────────────────────────────────────────

<VirtualHost *:80>
  ServerName serenabites.com
  ServerAlias www.serenabites.com
  ServerAdmin hola@serenabites.com

  # Redirige todo a HTTPS excepto el challenge de Let's Encrypt
  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
  RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]

  # Si por lo que sea no hay HTTPS aún, los includes siguen sirviendo el site
  Include /var/www/html/serenabites/deploy/serenabites-common.conf
  RequestHeader set X-Forwarded-Proto "http"

  ErrorLog  ${APACHE_LOG_DIR}/serenabites-error.log
  CustomLog ${APACHE_LOG_DIR}/serenabites-access.log combined
</VirtualHost>
