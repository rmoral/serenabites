# Directivas compartidas entre el VirtualHost HTTP y HTTPS.
# ───────────────────────────────────────────────────────────────
# Inclúyelo desde ambos vhosts con:
#   Include /var/www/html/serenabites/deploy/serenabites-common.conf
# ───────────────────────────────────────────────────────────────

DocumentRoot /var/www/html/serenabites
DirectoryIndex index.html

<Directory /var/www/html/serenabites>
  Require all granted
  Options -Indexes +FollowSymLinks
  AllowOverride None
</Directory>

# Protege todo lo que NO debe ser accesible vía web
<DirectoryMatch "/var/www/html/serenabites/(api|admin|deploy|node_modules|data|\.git)(/|$)">
  Require all denied
</DirectoryMatch>
<FilesMatch "^(\.env.*|package(-lock)?\.json|server\.js|.*\.db|.*\.db-journal|.*\.db-wal|.*\.db-shm)$">
  Require all denied
</FilesMatch>

# /admin → SPA del back-office
Alias /admin /var/www/html/serenabites/admin-ui
<Directory /var/www/html/serenabites/admin-ui>
  Require all granted
  Options -Indexes
  DirectoryIndex index.html
  # Cache cero para que actualizaciones del back-office se vean al instante
  Header set Cache-Control "no-store"
</Directory>
# /admin sin barra → /admin/
RedirectMatch 301 ^/admin$ /admin/

# Reverse proxy /api/* → Node (127.0.0.1:3010)
ProxyRequests Off
ProxyPreserveHost On
ProxyPass        /api/  http://127.0.0.1:3010/api/  retry=0 timeout=15
ProxyPassReverse /api/  http://127.0.0.1:3010/api/

RequestHeader set X-Forwarded-Host "%{HTTP_HOST}e"
# Nota: X-Forwarded-Proto se setea por vhost (http/https) — NO aquí.

# Cabeceras de seguridad
Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "SAMEORIGIN"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

# Caché agresiva para assets versionables (cambian de URL en deploy)
<FilesMatch "\.(svg|woff2?|ttf|eot|ico|png|jpg|jpeg|webp)$">
  Header set Cache-Control "public, max-age=31536000, immutable"
</FilesMatch>
# HTML del sitio público — caché corta para que un deploy se vea pronto
<FilesMatch "^index\.html$">
  Header set Cache-Control "public, max-age=300, must-revalidate"
</FilesMatch>

AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
